services:
  postgres:
    image: postgres:16-alpine
    container_name: ledger-postgres
    ports: ["5432:5432"]
    environment:
      POSTGRES_USER: ledger
      POSTGRES_PASSWORD: ledger_dev_password
      POSTGRES_DB: ledger
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger -d ledger"]
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: ledger-kafka
    ports: ["9092:9092"]
    environment:
      # KRaft mode — no Zookeeper.
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:29093,PLAINTEXT_INTERNAL://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: ledger-app
    ports: ["8080:8080"]
    depends_on:
      postgres: { condition: service_healthy }
      kafka:    { condition: service_healthy }
    environment:
      - DB_URL=jdbc:postgresql://postgres:5432/ledger
      - DB_USERNAME=ledger
      - DB_PASSWORD=ledger_dev_password
      - KAFKA_BOOTSTRAP=kafka:29092
      - KAFKA_GROUP_ID=ledger

volumes:
  postgres_data:
