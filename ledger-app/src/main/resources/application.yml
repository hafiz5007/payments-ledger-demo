spring:
  application:
    name: payments-ledger

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ledger}
    username: ${DB_USERNAME:ledger}
    password: ${DB_PASSWORD:ledger_dev_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # never let JPA auto-generate schema — Flyway owns it.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc.time_zone: UTC
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      group-id: ${KAFKA_GROUP_ID:ledger}

server:
  port: 8080
  shutdown: graceful
  error:
    include-message: always

ledger:
  outbox:
    poll-interval: PT1S
    batch-size: 100

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized

logging:
  level:
    com.hafiz5007.ledger: INFO
    org.springframework.kafka: WARN
    org.springframework.orm.jpa: WARN
